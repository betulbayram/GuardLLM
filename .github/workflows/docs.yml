name: Docs

on:
  push:
    branches: [main, master]
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - ".github/workflows/docs.yml"
  # Actions sekmesinden elle çalıştırmayı sağlar (ilk gh-pages dalını oluşturmak için).
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install docs deps
        run: pip install ".[docs]"

      - name: Build & deploy to GitHub Pages
        run: mkdocs gh-deploy --force
