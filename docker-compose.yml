services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: guardllm
      POSTGRES_PASSWORD: guardllm
      POSTGRES_DB: guardllm
    ports:
      - "5432:5432"
    volumes:
      - guardllm_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U guardllm"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: .
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      # Point the monitor at PostgreSQL (see api/main.py / MonitorConfig).
      GUARDLLM_LOG_TO: postgresql
      GUARDLLM_DSN: postgresql://guardllm:guardllm@db:5432/guardllm
      # Restrict CORS in production (comma-separated origins, or "*").
      GUARDLLM_CORS_ORIGINS: "*"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  guardllm_pgdata:
